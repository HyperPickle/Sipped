name: Sipped
options:
  bundleIdPrefix: com.rishisinghal
  deploymentTarget:
    iOS: "26.0"
  createIntermediateGroups: true
settings:
  base:
    SWIFT_VERSION: "5.0"
    SWIFT_DEFAULT_ACTOR_ISOLATION: MainActor
    SWIFT_APPROACHABLE_CONCURRENCY: YES
    CODE_SIGN_STYLE: Automatic
    DEVELOPMENT_TEAM: Q542L49V3D
targets:
  Sipped:
    type: application
    platform: iOS
    sources:
      - Sipped
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.rishisinghal.Sipped
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPhone: UIInterfaceOrientationPortrait
        TARGETED_DEVICE_FAMILY: "1"
        ASSETCATALOG_COMPILER_APPICON_NAME: Sipped
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
  SippedTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - SippedTests
    dependencies:
      - target: Sipped
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.rishisinghal.SippedTests
        GENERATE_INFOPLIST_FILE: YES
  SippedUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - SippedUITests
    dependencies:
      - target: Sipped
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.rishisinghal.SippedUITests
        GENERATE_INFOPLIST_FILE: YES
        TEST_TARGET_NAME: Sipped
schemes:
  Sipped:
    build:
      targets:
        Sipped: all
        SippedTests: [test]
        SippedUITests: [test]
    test:
      targets:
        - SippedTests
        - SippedUITests
      gatherCoverageData: false
